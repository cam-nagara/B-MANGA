schema_version = "1.0.0"

id = "b_name"
version = "0.5.50"
name = "B-Name"
tagline = "Blender manga name/storyboard authoring addon"
maintainer = "B-Name Project"
type = "add-on"

blender_version_min = "4.3.0"

# Blender API (GPL) に依存するため GPL を仮置き。後段で再検討可。
license = [
    "SPDX:GPL-2.0-or-later",
]

# Blender Extensions Platform の add-on 用公認タグから選択。
# 参考: https://docs.blender.org/manual/en/latest/advanced/extensions/tags.html
tags = ["Grease Pencil", "Paint", "User Interface"]

# Bundled Python wheels
# Actual wheel files are placed under ./wheels/ and listed here.
wheels = [
    "./wheels/pillow-12.2.0-cp311-cp311-win_amd64.whl",
    "./wheels/pillow-12.2.0-cp312-cp312-win_amd64.whl",
    "./wheels/pillow-12.2.0-cp313-cp313-win_amd64.whl",
]

# Platforms (optional, omit to allow all). Populate when wheels become platform-specific.
platforms = ["windows-x64"]

# Extensions Platform permissions
# Blender 5.1.1 (schema_version 1.0.0) は permissions を **string array** 形式
# でのみ受け付ける。inline table やテーブルセクション形式は
# "Unable to parse the manifest" を引き起こすため使用しない。
permissions = ["network", "files"]
